<!-- Profile Section -->
<section class="container profile-section">

  <div class="profile-card">
    <h1>My Profile</h1>

    <!-- Profile Image -->
    <div class="profile-image">
      <img id="preview" src="images/gamarprofile.jpeg" alt="Profile Picture">
    </div>

    <!-- Upload Button -->
    <input type="file" id="upload" accept="image/*">

    <!-- Profile Info -->
    <div class="profile-info">
      <p><strong>Name:</strong> MUHAMMAD KHAIZAN AFNAN BIN KAMARUZZAMAN</p>
      <p><strong>Email:</strong> IPJ251310769@student.kptm.edu.my</p>
      <p><strong>Favorite Pet:</strong> cat</p>
    </div>

  </div>

</section>

<!-- Simple Script to Preview Image -->
<script>
  const upload = document.getElementById("upload");
  const preview = document.getElementById("preview");

  upload.addEventListener("change", function() {
    const file = this.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = function() {
        preview.src = reader.result;
      }
      reader.readAsDataURL(file);
    }
  });
</script>

</body>
